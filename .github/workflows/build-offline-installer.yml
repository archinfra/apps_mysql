name: Build MySQL Offline Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-offline-installer.yml"
      - "build.sh"
      - "install.sh"
      - "scripts/**"
      - "README.md"
      - "images/**"
      - "manifests/**"
  pull_request:
    paths:
      - ".github/workflows/build-offline-installer.yml"
      - "build.sh"
      - "install.sh"
      - "scripts/**"
      - "README.md"
      - "images/**"
      - "manifests/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        profile:
          - integrated
          - benchmark
          - monitoring

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure executable permissions
        run: |
          chmod +x build.sh install.sh scripts/assemble-install.sh

      - name: Resolve package metadata
        id: meta
        run: |
          case "${{ matrix.profile }}" in
            integrated)
              echo "basename=mysql-installer" >> "$GITHUB_OUTPUT"
              ;;
            benchmark)
              echo "basename=mysql-benchmark" >> "$GITHUB_OUTPUT"
              ;;
            monitoring)
              echo "basename=mysql-monitoring" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Build installer
        run: |
          ./build.sh --arch "${{ matrix.arch }}" --profile "${{ matrix.profile }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.basename }}-${{ matrix.arch }}
          path: |
            dist/${{ steps.meta.outputs.basename }}-${{ matrix.arch }}.run
            dist/${{ steps.meta.outputs.basename }}-${{ matrix.arch }}.run.sha256
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
