apiVersion: archinfra.io/v1alpha1
kind: MysqlBackupPlanSet
defaultPlanEnabled: false
restoreSource: auto
defaults:
  rootDir: backups
  retention: 7
plans:
  - name: dc1-nfs
    backend: nfs
    nfsServer: 192.168.10.2
    nfsPath: /data/nfs-a
    schedule: "0 2 * * *"
    databases:
      - orders
      - inventory
  - name: dc2-nfs
    backend: nfs
    nfsServer: 192.168.20.2
    nfsPath: /data/nfs-b
    schedule: "10 2 * * *"
    databases:
      - orders
      - inventory
  - name: audit-minio
    backend: s3
    s3Endpoint: https://minio.dc3.example.com
    s3Bucket: mysql-backup
    s3Prefix: prod
    s3AccessKey: minio
    s3SecretKey: change-me
    schedule: "20 2 * * *"
    retention: 30
    tables:
      - orders.audit_log
      - orders.audit_event
