apiVersion: v1
kind: Secret
metadata:
  name: __ADDON_EXPORTER_SECRET__
  labels:
    app: __APP_NAME__
    addon.mysql.io/type: monitoring
type: Opaque
stringData:
  .my.cnf: |
    [client]
    user=__ADDON_EXPORTER_USERNAME__
    password=__ADDON_EXPORTER_PASSWORD__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: __ADDON_EXPORTER_DEPLOYMENT_NAME__
  labels:
    app: __APP_NAME__
    addon.mysql.io/type: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: __APP_NAME__
      addon.mysql.io/type: monitoring
  template:
    metadata:
      labels:
        app: __APP_NAME__
        addon.mysql.io/type: monitoring
    spec:
      containers:
        - name: mysqld-exporter
          image: __MYSQL_EXPORTER_IMAGE__
          imagePullPolicy: IfNotPresent
          args:
            - "--config.my-cnf=/etc/mysql-exporter/.my.cnf"
            - "--mysqld.address=__ADDON_MONITORING_TARGET__"
          ports:
            - name: metrics
              containerPort: __METRICS_PORT__
          volumeMounts:
            - name: exporter-auth
              mountPath: /etc/mysql-exporter
              readOnly: true
          resources:
            requests:
              cpu: __MYSQL_EXPORTER_REQUEST_CPU__
              memory: __MYSQL_EXPORTER_REQUEST_MEM__
            limits:
              cpu: __MYSQL_EXPORTER_LIMIT_CPU__
              memory: __MYSQL_EXPORTER_LIMIT_MEM__
      volumes:
        - name: exporter-auth
          secret:
            secretName: __ADDON_EXPORTER_SECRET__
---
apiVersion: v1
kind: Service
metadata:
  name: __ADDON_EXPORTER_SERVICE_NAME__
  labels:
    app: __APP_NAME__
    metrics: "enabled"
    addon.mysql.io/type: monitoring
spec:
  selector:
    app: __APP_NAME__
    addon.mysql.io/type: monitoring
  ports:
    - name: metrics
      port: __METRICS_PORT__
      targetPort: metrics
---
#__FEATURE_SERVICE_MONITOR_START__
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: __ADDON_SERVICE_MONITOR_NAME__
  labels:
    app: __APP_NAME__
    addon.mysql.io/type: monitoring
    monitoring.archinfra.io/stack: default
spec:
  namespaceSelector:
    matchNames:
      - __NAMESPACE__
  selector:
    matchLabels:
      app: __APP_NAME__
      addon.mysql.io/type: monitoring
  endpoints:
    - port: metrics
      interval: __SERVICE_MONITOR_INTERVAL__
      scrapeTimeout: __SERVICE_MONITOR_SCRAPE_TIMEOUT__
      path: /metrics
#__FEATURE_SERVICE_MONITOR_END__
---
#__FEATURE_PROMETHEUS_RULE_START__
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: __ADDON_PROMETHEUS_RULE_NAME__
  labels:
    app: __APP_NAME__
    addon.mysql.io/type: monitoring
    monitoring.archinfra.io/stack: default
spec:
  groups:
    - name: __APP_NAME__-addon
      rules:
        - alert: MySQLAddonExporterDown
          expr: min(mysql_up{namespace="__NAMESPACE__"}) < 1
          for: 2m
          labels:
            severity: critical
            category: availability
          annotations:
            summary: MySQL addon exporter is down
            description: External MySQL monitoring addon exporter for __APP_NAME__ is down.
        - alert: MySQLAddonConnectionsHigh
          expr: |
            max(mysql_global_status_threads_connected{namespace="__NAMESPACE__"})
            /
            clamp_min(max(mysql_global_variables_max_connections{namespace="__NAMESPACE__"}), 1)
            * 100 > 80
          for: 10m
          labels:
            severity: warning
            category: saturation
          annotations:
            summary: External MySQL connection usage is high
            description: The monitored MySQL target for addon __APP_NAME__ is using more than 80% of max_connections.
#__FEATURE_PROMETHEUS_RULE_END__
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: __ADDON_GRAFANA_DASHBOARD_NAME__
  labels:
    app: __APP_NAME__
    addon.mysql.io/type: monitoring
    grafana_dashboard: "1"
    monitoring.archinfra.io/stack: default
  annotations:
    grafana_folder: Middleware/MySQL
data:
  mysql-addon-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 0},
          "targets": [{"expr": "min(mysql_up{namespace=\"__NAMESPACE__\"})", "refId": "A"}],
          "title": "MySQL Up",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 0},
          "targets": [{"expr": "max(mysql_global_status_threads_connected{namespace=\"__NAMESPACE__\"})", "refId": "A"}],
          "title": "Threads Connected",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 0},
          "targets": [{"expr": "increase(mysql_global_status_slow_queries{namespace=\"__NAMESPACE__\"}[1h])", "refId": "A"}],
          "title": "Slow Queries / 1h",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 0},
          "targets": [{"expr": "rate(mysql_global_status_questions{namespace=\"__NAMESPACE__\"}[5m])", "refId": "A"}],
          "title": "Query Rate",
          "type": "stat"
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["archinfra", "mysql"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "title": "MySQL Addon Overview",
      "version": 1
    }
