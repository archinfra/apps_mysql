apiVersion: v1
kind: Secret
metadata:
  name: __AUTH_SECRET__
type: Opaque
stringData:
  mysql-root-password: "__MYSQL_ROOT_PASSWORD__"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: __PROBE_CONFIGMAP__
data:
  livenessprobe.sh: |
    #!/bin/sh
    # Liveness probe: 检查 MySQL 是否存活
    MYSQL_SOCKET=/var/run/mysqld/mysqld.sock
    
    # Insert 1 success every this amount of failures
    # (assumes successThreshold is > 1)
    max_failures_during_progress=$1
    
    # Ping the server using socket
    mysqladmin -h localhost -umysqlhealthchecker -p'health@passw0rd' ping
    
    # If it's up, we succeed
    if [ $? -eq 0 ]; then
      exit 0
    fi
    
    if [ -z $max_failures_during_progress ]; then
      exit 1
    fi
    
    # If the init/startup/InnoDB recovery is still ongoing, we're
    # not succeeded nor failed yet, so keep failing and getting time
    # extensions until it succeeds.
    # We currently rely on the server to exit/abort if the init/startup fails,
    # but ideally there would be a way to check whether the server is
    # still making progress and not just stuck waiting on a frozen networked
    # volume, for example.
    
    if [ -f /tmp/fail-counter ]; then
      fail_count=$(($(cat /tmp/fail-counter) + 1))
    else
      fail_count=1
    fi    
    
    if [ $fail_count -gt $max_failures_during_progress ]; then
      # Report success to reset the failure counter upstream and get
      # a time extension
      rm -f /tmp/fail-counter
      exit 0
    else
      # Update the failure counter and fail out
      echo $fail_count > /tmp/fail-counter
      exit 1
    fi   

  readinessprobe.sh: |
    #!/bin/sh

    # Socket path for MySQL
    MYSQL_SOCKET=/var/run/mysqld/mysqld.sock

    # Once the container is ready, it's always ready.
    if [ -f /tmp/mysql-ready ]; then
      exit 0
    fi
    
    # Ping server using socket to see if it is ready
    if mysqladmin -h localhost -umysqlhealthchecker -p'health@passw0rd' ping; then
      touch /tmp/mysql-ready
      exit 0
    else
      exit 1
    fi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: __INIT_CONFIGMAP__
data:
  init-users.sql: |
    set sql_log_bin=0;
    
    # Create socket authenticated localroot@localhost account
    DROP USER IF EXISTS localroot@localhost;
    CREATE USER IF NOT EXISTS 'localroot'@'localhost' IDENTIFIED BY 'local@paasw0rd';
    GRANT ALL ON *.* TO 'localroot'@'localhost' WITH GRANT OPTION;
    GRANT PROXY ON ''@'' TO localroot@localhost WITH GRANT OPTION;
            
    # Drop the default account created by the docker image      
    DROP USER IF EXISTS mysqlhealthchecker@localhost;
    # Create account for liveness probe
    CREATE USER mysqlhealthchecker@localhost IDENTIFIED BY 'health@passw0rd';
    GRANT USAGE ON *.* TO 'mysqlhealthchecker'@'localhost';
  
    # Additional users for replication
    set sql_log_bin=1;
    CREATE USER IF NOT EXISTS 'repl'@'%' IDENTIFIED BY 'repl@passw0rd';
    GRANT REPLICATION SLAVE ON *.* TO 'repl'@'%';
    CREATE USER IF NOT EXISTS 'orch'@'%' IDENTIFIED BY 'orch@passw0rd';
    GRANT PROCESS, REPLICATION CLIENT, RELOAD ON *.* TO 'orch'@'%';
    FLUSH PRIVILEGES;

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: __MYSQL_CONFIGMAP__
data:
  # 将原有的00-basic.cnf、01-group_replication.cnf合并到my.cnf中
  my.cnf: |
    [mysqld]
    # 基础配置
    plugin_load_add=auth_socket.so
    loose_auth_socket=FORCE_PLUS_PERMANENT
    skip_log_error
    log_error_verbosity=3
    local-infile=1
    socket=/var/run/mysqld/mysqld.sock
    mysqlx_socket=/var/run/mysqld/mysqlx.sock
    
    # 复制相关配置
    log_bin=mycluster
    enforce_gtid_consistency=ON
    gtid_mode=ON
    relay_log_info_repository=TABLE
    skip_slave_start=1  
    loose_group_replication_recovery_use_ssl=1
    
    datadir=/var/lib/mysql
    !includedir /etc/mysql/conf.d
    
    [mysql]
    socket=/var/run/mysqld/mysqld.sock
    
    [mysqladmin]
    socket=/var/run/mysqld/mysqld.sock
---
apiVersion: v1
kind: Service
metadata:
  name: __SERVICE_NAME__
spec:
  clusterIP: None
  selector:
    app: __APP_NAME__
  ports:
    - port: 3306

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: __STS_NAME__
spec:
  serviceName: __SERVICE_NAME__
  replicas: __MYSQL_REPLICAS__
  selector:
    matchLabels:
      app: __APP_NAME__
  template:
    metadata:
      labels:
        app: __APP_NAME__
    spec:
      initContainers:
        - name: init-mysql
          image: __BUSYBOX_IMAGE__
          command:
            - sh
            - -c
            - |
              # 从主机名中提取数字序号 (例如 mysql-0 提取出 0)
              # 然后加 100，确保 ID 是正整数
              hostname=$(hostname)
              # 使用参数扩展提取最后一个 - 后的数字
              ordinal="${hostname##*-}"
              # 验证是否是数字
              if ! echo "$ordinal" | grep -qE '^[0-9]+$'; then
                echo "Failed to extract ordinal from hostname: $hostname"
                exit 1
              fi
              server_id=$((100 + ordinal))
              echo "[mysqld]" > /mnt/conf.d/server-id.cnf
              echo "server-id=$server_id" >> /mnt/conf.d/server-id.cnf
              echo "report_host=$(hostname)" >> /mnt/conf.d/server-id.cnf
          volumeMounts:
            - name: conf-dynamic  # 挂载到一个空的共享卷
              mountPath: /mnt/conf.d
      containers:
        - name: mysql
          image: __MYSQL_IMAGE__
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: __AUTH_SECRET__
                  key: mysql-root-password
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: init-users
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/mysql
            - name: config
              mountPath: /etc/my.cnf
              subPath: my.cnf
            - name: conf-dynamic   # 挂载 initContainer 生成的唯一 ID
              mountPath: /etc/mysql/conf.d/server-id.cnf
              subPath: server-id.cnf
            - name: socket-dir
              mountPath: /var/run/mysqld
            - name: probes
              mountPath: /usr/local/bin/probes
          # 使用socket认证的探针
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/probes/livenessprobe.sh
                - "10"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /usr/local/bin/probes/readinessprobe.sh
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 300m
              memory: 500Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: init-users
          configMap:
            name: __INIT_CONFIGMAP__
            items:
              - key: init-users.sql
                path: init-users.sql
        - name: config
          configMap:
            name: __MYSQL_CONFIGMAP__
        - name: probes
          configMap:
            name: __PROBE_CONFIGMAP__
            defaultMode: 0755
        - name: conf-dynamic
          emptyDir: { }
        - name: socket-dir
          emptyDir: { }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: __STORAGE_CLASS__
        resources:
          requests:
            storage: __STORAGE_SIZE__
---
# ClusterIP 服务（用于统一入口）
apiVersion: v1
kind: Service
metadata:
  name: __NODEPORT_SERVICE_NAME__
spec:
  type: NodePort
  selector:
    app: __APP_NAME__
  ports:
    - port: 3306
      targetPort: 3306
      nodePort: __NODE_PORT__

