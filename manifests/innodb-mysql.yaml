apiVersion: v1
kind: Secret
metadata:
  name: __AUTH_SECRET__
type: Opaque
stringData:
  mysql-root-password: "__MYSQL_ROOT_PASSWORD__"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: __PROBE_CONFIGMAP__
data:
  livenessprobe.sh: |
    #!/bin/sh
    mysqladmin -h localhost -umysqlhealthchecker -p'health@passw0rd' ping

    if [ $? -eq 0 ]; then
      exit 0
    fi

    max_failures_during_progress=$1
    if [ -z "$max_failures_during_progress" ]; then
      exit 1
    fi

    if [ -f /tmp/fail-counter ]; then
      fail_count=$(($(cat /tmp/fail-counter) + 1))
    else
      fail_count=1
    fi

    if [ "$fail_count" -gt "$max_failures_during_progress" ]; then
      rm -f /tmp/fail-counter
      exit 0
    fi

    echo "$fail_count" > /tmp/fail-counter
    exit 1

  readinessprobe.sh: |
    #!/bin/sh

    if [ -f /tmp/mysql-ready ]; then
      exit 0
    fi

    if mysqladmin -h localhost -umysqlhealthchecker -p'health@passw0rd' ping; then
      touch /tmp/mysql-ready
      exit 0
    fi

    exit 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: __INIT_CONFIGMAP__
data:
  init-users.sql: |
    set sql_log_bin=0;

    DROP USER IF EXISTS localroot@localhost;
    CREATE USER IF NOT EXISTS 'localroot'@'localhost' IDENTIFIED BY 'local@paasw0rd';
    GRANT ALL ON *.* TO 'localroot'@'localhost' WITH GRANT OPTION;
    GRANT PROXY ON ''@'' TO localroot@localhost WITH GRANT OPTION;

    DROP USER IF EXISTS mysqlhealthchecker@localhost;
    CREATE USER mysqlhealthchecker@localhost IDENTIFIED BY 'health@passw0rd';
    GRANT USAGE ON *.* TO 'mysqlhealthchecker'@'localhost';

    set sql_log_bin=1;
    CREATE USER IF NOT EXISTS 'repl'@'%' IDENTIFIED BY 'repl@passw0rd';
    GRANT REPLICATION SLAVE ON *.* TO 'repl'@'%';
    CREATE USER IF NOT EXISTS 'orch'@'%' IDENTIFIED BY 'orch@passw0rd';
    GRANT PROCESS, REPLICATION CLIENT, RELOAD ON *.* TO 'orch'@'%';
    FLUSH PRIVILEGES;
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: __MYSQL_CONFIGMAP__
data:
  my.cnf: |
    [mysqld]
    plugin_load_add=auth_socket.so
    loose_auth_socket=FORCE_PLUS_PERMANENT
    log_error_verbosity=3
    log_error=/var/log/mysql/error.log
    slow_query_log=ON
    slow_query_log_file=/var/log/mysql/slow.log
    long_query_time=__MYSQL_SLOW_QUERY_TIME__
    log_queries_not_using_indexes=ON
    local-infile=1
    socket=/var/run/mysqld/mysqld.sock
    mysqlx_socket=/var/run/mysqld/mysqlx.sock

    log_bin=mycluster
    enforce_gtid_consistency=ON
    gtid_mode=ON
    skip_replica_start=1

    datadir=/var/lib/mysql
    !includedir /etc/mysql/conf.d

    [mysql]
    socket=/var/run/mysqld/mysqld.sock

    [mysqladmin]
    socket=/var/run/mysqld/mysqld.sock
---
#__FEATURE_FLUENTBIT_START__
apiVersion: v1
kind: ConfigMap
metadata:
  name: __FLUENTBIT_CONFIGMAP__
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush 1
        Daemon Off
        Log_Level info

    [INPUT]
        Name tail
        Tag mysql.slow
        Path /var/log/mysql/slow.log
        DB /tmp/mysql-slow.db
        Read_from_Head true
        Refresh_Interval 5
        Skip_Long_Lines On

    [FILTER]
        Name modify
        Match mysql.*
        Add namespace __NAMESPACE__
        Add statefulset __STS_NAME__
        Add app __APP_NAME__

    [OUTPUT]
        Name stdout
        Match *
#__FEATURE_FLUENTBIT_END__
---
apiVersion: v1
kind: Service
metadata:
  name: __SERVICE_NAME__
spec:
  clusterIP: None
  selector:
    app: __APP_NAME__
  ports:
    - port: 3306
---
#__FEATURE_MONITORING_START__
apiVersion: v1
kind: Service
metadata:
  name: __METRICS_SERVICE_NAME__
  labels:
    app: __APP_NAME__
    metrics: "enabled"
spec:
  selector:
    app: __APP_NAME__
  ports:
    - name: metrics
      port: __METRICS_PORT__
      targetPort: metrics
#__FEATURE_MONITORING_END__
---
#__FEATURE_SERVICE_MONITOR_START__
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: __SERVICE_MONITOR_NAME__
  labels:
    app: __APP_NAME__
    monitoring.archinfra.io/stack: default
spec:
  namespaceSelector:
    matchNames:
      - __NAMESPACE__
  selector:
    matchLabels:
      app: __APP_NAME__
      metrics: "enabled"
  endpoints:
    - port: metrics
      interval: __SERVICE_MONITOR_INTERVAL__
      scrapeTimeout: __SERVICE_MONITOR_SCRAPE_TIMEOUT__
      path: /metrics
#__FEATURE_SERVICE_MONITOR_END__
---
#__FEATURE_PROMETHEUS_RULE_START__
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: __PROMETHEUS_RULE_NAME__
  labels:
    app: __APP_NAME__
    monitoring.archinfra.io/stack: default
spec:
  groups:
    - name: __APP_NAME__
      rules:
        - alert: MySQLDown
          expr: min(mysql_up{namespace="__NAMESPACE__"}) < 1
          for: 2m
          labels:
            severity: critical
            category: availability
          annotations:
            summary: MySQL exporter is down
            description: MySQL exporter for __APP_NAME__ in namespace __NAMESPACE__ has been unavailable for more than 2 minutes.
        - alert: MySQLConnectionsHigh
          expr: |
            max(mysql_global_status_threads_connected{namespace="__NAMESPACE__"})
            /
            clamp_min(max(mysql_global_variables_max_connections{namespace="__NAMESPACE__"}), 1)
            * 100 > 80
          for: 10m
          labels:
            severity: warning
            category: saturation
          annotations:
            summary: MySQL connection usage is high
            description: MySQL __APP_NAME__ is using more than 80% of max_connections for 10 minutes.
        - alert: MySQLSlowQueriesHigh
          expr: increase(mysql_global_status_slow_queries{namespace="__NAMESPACE__"}[10m]) > 0
          for: 10m
          labels:
            severity: warning
            category: performance
          annotations:
            summary: MySQL slow queries detected
            description: MySQL __APP_NAME__ has recorded slow queries in the last 10 minutes.
#__FEATURE_PROMETHEUS_RULE_END__
---
#__FEATURE_MONITORING_START__
apiVersion: v1
kind: ConfigMap
metadata:
  name: __GRAFANA_DASHBOARD_NAME__
  labels:
    app: __APP_NAME__
    grafana_dashboard: "1"
    monitoring.archinfra.io/stack: default
  annotations:
    grafana_folder: Middleware/MySQL
data:
  mysql-overview.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "min(mysql_up{namespace=\"__NAMESPACE__\"})",
              "refId": "A"
            }
          ],
          "title": "MySQL Up",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 0},
          "targets": [
            {
              "expr": "max(mysql_global_status_threads_connected{namespace=\"__NAMESPACE__\"})",
              "refId": "A"
            }
          ],
          "title": "Threads Connected",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "max(mysql_global_status_threads_running{namespace=\"__NAMESPACE__\"})",
              "refId": "A"
            }
          ],
          "title": "Threads Running",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 0},
          "targets": [
            {
              "expr": "increase(mysql_global_status_slow_queries{namespace=\"__NAMESPACE__\"}[1h])",
              "refId": "A"
            }
          ],
          "title": "Slow Queries / 1h",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 5},
          "targets": [
            {
              "expr": "rate(mysql_global_status_questions{namespace=\"__NAMESPACE__\"}[5m])",
              "legendFormat": "questions/s",
              "refId": "A"
            }
          ],
          "title": "Query Rate",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 5},
          "targets": [
            {
              "expr": "max(mysql_global_status_threads_connected{namespace=\"__NAMESPACE__\"})",
              "legendFormat": "connected",
              "refId": "A"
            },
            {
              "expr": "max(mysql_global_variables_max_connections{namespace=\"__NAMESPACE__\"})",
              "legendFormat": "max",
              "refId": "B"
            }
          ],
          "title": "Connections",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["archinfra", "mysql"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "title": "MySQL Overview",
      "version": 1
    }
#__FEATURE_MONITORING_END__
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: __STS_NAME__
spec:
  serviceName: __SERVICE_NAME__
  replicas: __MYSQL_REPLICAS__
  selector:
    matchLabels:
      app: __APP_NAME__
  template:
    metadata:
      labels:
        app: __APP_NAME__
    spec:
      initContainers:
        - name: init-mysql
          image: __BUSYBOX_IMAGE__
          command:
            - sh
            - -c
            - |
              hostname=$(hostname)
              ordinal="${hostname##*-}"
              if ! echo "$ordinal" | grep -qE '^[0-9]+$'; then
                echo "Failed to extract ordinal from hostname: $hostname"
                exit 1
              fi
              server_id=$((100 + ordinal))
              echo "[mysqld]" > /mnt/conf.d/server-id.cnf
              echo "server-id=$server_id" >> /mnt/conf.d/server-id.cnf
              echo "report_host=$(hostname)" >> /mnt/conf.d/server-id.cnf
              mkdir -p /mnt/mysql-log
              chmod 0777 /mnt/mysql-log
              : > /mnt/mysql-log/error.log
              : > /mnt/mysql-log/slow.log
              chmod 0666 /mnt/mysql-log/error.log /mnt/mysql-log/slow.log
          volumeMounts:
            - name: conf-dynamic
              mountPath: /mnt/conf.d
            - name: mysql-log
              mountPath: /mnt/mysql-log
          resources:
            requests:
              cpu: __MYSQL_INIT_REQUEST_CPU__
              memory: __MYSQL_INIT_REQUEST_MEM__
            limits:
              cpu: __MYSQL_INIT_LIMIT_CPU__
              memory: __MYSQL_INIT_LIMIT_MEM__
      containers:
        - name: mysql
          image: __MYSQL_IMAGE__
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /var/log/mysql
              touch /var/log/mysql/error.log /var/log/mysql/slow.log
              chmod 0666 /var/log/mysql/error.log /var/log/mysql/slow.log
              tail -n0 -F /var/log/mysql/error.log >&2 &
#__FEATURE_STDOUT_LOGGING_START__
              tail -n0 -F /var/log/mysql/slow.log >&1 &
#__FEATURE_STDOUT_LOGGING_END__
              if command -v docker-entrypoint.sh >/dev/null 2>&1; then
                exec docker-entrypoint.sh mysqld
              fi
              exec /entrypoint.sh mysqld
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: __AUTH_SECRET__
                  key: mysql-root-password
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: init-users
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/mysql
            - name: config
              mountPath: /etc/my.cnf
              subPath: my.cnf
            - name: conf-dynamic
              mountPath: /etc/mysql/conf.d/server-id.cnf
              subPath: server-id.cnf
            - name: socket-dir
              mountPath: /var/run/mysqld
            - name: probes
              mountPath: /usr/local/bin/probes
            - name: mysql-log
              mountPath: /var/log/mysql
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/probes/livenessprobe.sh
                - "10"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /usr/local/bin/probes/readinessprobe.sh
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: __MYSQL_REQUEST_CPU__
              memory: __MYSQL_REQUEST_MEM__
            limits:
              cpu: __MYSQL_LIMIT_CPU__
              memory: __MYSQL_LIMIT_MEM__
#__FEATURE_MONITORING_START__
        - name: mysqld-exporter
          image: __MYSQL_EXPORTER_IMAGE__
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              cat > /tmp/exporter.cnf <<EOF
              [client]
              user=root
              password=${MYSQL_ROOT_PASSWORD}
              host=127.0.0.1
              port=3306
              EOF
              exec /bin/mysqld_exporter --config.my-cnf=/tmp/exporter.cnf
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: __AUTH_SECRET__
                  key: mysql-root-password
          ports:
            - name: metrics
              containerPort: __METRICS_PORT__
          resources:
            requests:
              cpu: __MYSQL_EXPORTER_REQUEST_CPU__
              memory: __MYSQL_EXPORTER_REQUEST_MEM__
            limits:
              cpu: __MYSQL_EXPORTER_LIMIT_CPU__
              memory: __MYSQL_EXPORTER_LIMIT_MEM__
#__FEATURE_MONITORING_END__
#__FEATURE_FLUENTBIT_START__
        - name: fluent-bit
          image: __FLUENTBIT_IMAGE__
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - /fluent-bit/etc/fluent-bit.conf
          volumeMounts:
            - name: mysql-log
              mountPath: /var/log/mysql
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc
          resources:
            requests:
              cpu: __FLUENTBIT_REQUEST_CPU__
              memory: __FLUENTBIT_REQUEST_MEM__
            limits:
              cpu: __FLUENTBIT_LIMIT_CPU__
              memory: __FLUENTBIT_LIMIT_MEM__
#__FEATURE_FLUENTBIT_END__
      volumes:
        - name: init-users
          configMap:
            name: __INIT_CONFIGMAP__
            items:
              - key: init-users.sql
                path: init-users.sql
        - name: config
          configMap:
            name: __MYSQL_CONFIGMAP__
        - name: probes
          configMap:
            name: __PROBE_CONFIGMAP__
            defaultMode: 0755
        - name: mysql-log
          emptyDir: {}
#__FEATURE_FLUENTBIT_START__
        - name: fluent-bit-config
          configMap:
            name: __FLUENTBIT_CONFIGMAP__
#__FEATURE_FLUENTBIT_END__
        - name: conf-dynamic
          emptyDir: {}
        - name: socket-dir
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: __STORAGE_CLASS__
        resources:
          requests:
            storage: __STORAGE_SIZE__
---
#__FEATURE_NODEPORT_START__
apiVersion: v1
kind: Service
metadata:
  name: __NODEPORT_SERVICE_NAME__
spec:
  type: NodePort
  selector:
    app: __APP_NAME__
  ports:
    - port: 3306
      targetPort: 3306
      nodePort: __NODE_PORT__
#__FEATURE_NODEPORT_END__
