apiVersion: batch/v1
kind: CronJob
metadata:
  name: __BACKUP_CRONJOB_NAME__
spec:
  schedule: "__BACKUP_SCHEDULE__"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          #__BACKUP_S3_START__
          initContainers:
            - name: s3-prefetch
              image: __S3_CLIENT_IMAGE__
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /scripts/s3-prefetch.sh
              env:
                - name: NAMESPACE
                  value: "__NAMESPACE__"
                - name: MYSQL_TARGET_NAME
                  value: "__MYSQL_TARGET_NAME__"
                - name: BACKUP_ROOT_DIR
                  value: "__BACKUP_ROOT_DIR__"
                - name: BACKUP_BASE_DIR
                  value: "/workspace/export"
                - name: S3_ENDPOINT
                  value: "__S3_ENDPOINT__"
                - name: S3_BUCKET
                  value: "__S3_BUCKET__"
                - name: S3_PREFIX
                  value: "__S3_PREFIX__"
                - name: S3_INSECURE
                  value: "__S3_INSECURE__"
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: __BACKUP_STORAGE_SECRET__
                      key: s3-access-key
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: __BACKUP_STORAGE_SECRET__
                      key: s3-secret-key
              volumeMounts:
                - name: backup-scripts
                  mountPath: /scripts
                - name: export-staging
                  mountPath: /workspace/export
          #__BACKUP_S3_END__
          containers:
            - name: mysql-backup
              image: __MYSQL_IMAGE__
              imagePullPolicy: IfNotPresent
              command:
                - /bin/bash
                - /scripts/backup.sh
              env:
                - name: NAMESPACE
                  value: "__NAMESPACE__"
                - name: MYSQL_TARGET_NAME
                  value: "__MYSQL_TARGET_NAME__"
                - name: MYSQL_HOST
                  value: "__MYSQL_HOST__"
                - name: MYSQL_PORT
                  value: "__MYSQL_PORT__"
                - name: MYSQL_USER
                  value: "__MYSQL_USER__"
                - name: MYSQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: __MYSQL_AUTH_SECRET__
                      key: __MYSQL_PASSWORD_KEY__
                - name: BACKUP_ROOT_DIR
                  value: "__BACKUP_ROOT_DIR__"
                - name: BACKUP_RETENTION
                  value: "__BACKUP_RETENTION__"
                #__BACKUP_NFS_START__
                - name: BACKUP_BASE_DIR
                  value: "/backup"
                #__BACKUP_NFS_END__
                #__BACKUP_S3_START__
                - name: BACKUP_BASE_DIR
                  value: "/workspace/export"
                - name: STATUS_DIR
                  value: "/workspace/status"
                #__BACKUP_S3_END__
              volumeMounts:
                - name: backup-scripts
                  mountPath: /scripts
                #__BACKUP_NFS_START__
                - name: backup-storage
                  mountPath: /backup
                #__BACKUP_NFS_END__
                #__BACKUP_S3_START__
                - name: export-staging
                  mountPath: /workspace/export
                - name: status-dir
                  mountPath: /workspace/status
                #__BACKUP_S3_END__
          #__BACKUP_S3_START__
            - name: s3-upload
              image: __S3_CLIENT_IMAGE__
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /scripts/s3-upload.sh
              env:
                - name: NAMESPACE
                  value: "__NAMESPACE__"
                - name: MYSQL_TARGET_NAME
                  value: "__MYSQL_TARGET_NAME__"
                - name: BACKUP_ROOT_DIR
                  value: "__BACKUP_ROOT_DIR__"
                - name: BACKUP_BASE_DIR
                  value: "/workspace/export"
                - name: STATUS_DIR
                  value: "/workspace/status"
                - name: S3_ENDPOINT
                  value: "__S3_ENDPOINT__"
                - name: S3_BUCKET
                  value: "__S3_BUCKET__"
                - name: S3_PREFIX
                  value: "__S3_PREFIX__"
                - name: S3_INSECURE
                  value: "__S3_INSECURE__"
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: __BACKUP_STORAGE_SECRET__
                      key: s3-access-key
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: __BACKUP_STORAGE_SECRET__
                      key: s3-secret-key
              volumeMounts:
                - name: backup-scripts
                  mountPath: /scripts
                - name: export-staging
                  mountPath: /workspace/export
                - name: status-dir
                  mountPath: /workspace/status
          #__BACKUP_S3_END__
          volumes:
            - name: backup-scripts
              configMap:
                name: __BACKUP_SCRIPT_CONFIGMAP__
                defaultMode: 0755
            #__BACKUP_NFS_START__
            - name: backup-storage
              nfs:
                server: __BACKUP_NFS_SERVER__
                path: __BACKUP_NFS_PATH__
            #__BACKUP_NFS_END__
            #__BACKUP_S3_START__
            - name: export-staging
              emptyDir: {}
            - name: status-dir
              emptyDir: {}
            #__BACKUP_S3_END__
