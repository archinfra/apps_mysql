apiVersion: batch/v1
kind: Job
metadata:
  name: __RESTORE_JOB_NAME__
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: mysql-restore
          image: __MYSQL_IMAGE__
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - /scripts/restore.sh
          env:
            - name: NAMESPACE
              value: "__NAMESPACE__"
            - name: STS_NAME
              value: "__STS_NAME__"
            - name: MYSQL_HOST
              value: "__STS_NAME__-0.__SERVICE_NAME__.__NAMESPACE__.svc.cluster.local"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_USER
              value: "root"
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: __AUTH_SECRET__
                  key: mysql-root-password
            - name: BACKUP_ROOT_DIR
              value: "__BACKUP_ROOT_DIR__"
            - name: MYSQL_RESTORE_SNAPSHOT
              value: "__RESTORE_SNAPSHOT__"
          volumeMounts:
            - name: backup-scripts
              mountPath: /scripts
            - name: backup-storage
              mountPath: /backup
      volumes:
        - name: backup-scripts
          configMap:
            name: __BACKUP_SCRIPT_CONFIGMAP__
            defaultMode: 0755
        - name: backup-storage
          nfs:
            server: __BACKUP_NFS_SERVER__
            path: __BACKUP_NFS_PATH__
