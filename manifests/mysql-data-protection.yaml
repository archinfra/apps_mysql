apiVersion: dataprotection.archinfra.io/v1alpha1
kind: BackupAddon
metadata:
  name: __BACKUP_ADDON_NAME__
spec:
  displayName: MySQL Dump Addon
  version: integrated-with-apps-mysql
  supportedKinds:
    - MySQL
    - StatefulSet
  parameters:
    - name: database
      description: Optional database to dump.
    - name: dumpArgs
      description: Extra mysqldump arguments.
  backupTemplate:
    image: __MYSQL_IMAGE__
    command:
      - /bin/sh
    args:
      - -ceu
      - |
        set -eu
        mkdir -p /workspace/output
        host="${DP_SOURCE_HOST:?DP_SOURCE_HOST is required}"
        port="${DP_SOURCE_PORT:-3306}"
        user="${DP_SOURCE_USERNAME_FROM_SECRET:-${DP_SOURCE_USERNAME:-root}}"
        pass="${DP_SOURCE_PASSWORD:-}"
        dump_args="${DP_PARAM_DUMPARGS:-}"
        if [ -n "${DP_PARAM_DATABASE:-}" ]; then
          exec mysqldump -h"${host}" -P"${port}" -u"${user}" -p"${pass}" ${dump_args} "${DP_PARAM_DATABASE}" > /workspace/output/dump.sql
        fi
        exec mysqldump -h"${host}" -P"${port}" -u"${user}" -p"${pass}" ${dump_args} --all-databases > /workspace/output/dump.sql
  restoreTemplate:
    image: __MYSQL_IMAGE__
    command:
      - /bin/sh
    args:
      - -ceu
      - |
        set -eu
        test -f /workspace/input/dump.sql
        host="${DP_SOURCE_HOST:?DP_SOURCE_HOST is required}"
        port="${DP_SOURCE_PORT:-3306}"
        user="${DP_SOURCE_USERNAME_FROM_SECRET:-${DP_SOURCE_USERNAME:-root}}"
        pass="${DP_SOURCE_PASSWORD:-}"
        exec mysql -h"${host}" -P"${port}" -u"${user}" -p"${pass}" < /workspace/input/dump.sql
---
apiVersion: dataprotection.archinfra.io/v1alpha1
kind: BackupSource
metadata:
  name: __BACKUP_SOURCE_NAME__
  namespace: __BACKUP_NAMESPACE__
spec:
  addonRef:
    name: __BACKUP_ADDON_NAME__
  endpoint:
    host: __BACKUP_MYSQL_HOST__
    port: __MYSQL_PORT__
    username: root
    passwordFrom:
      name: __BACKUP_AUTH_SECRET__
      key: password
#__FEATURE_BACKUP_DATABASE_START__
  parameters:
    database: __BACKUP_DATABASE__
#__FEATURE_BACKUP_DATABASE_END__
---
apiVersion: dataprotection.archinfra.io/v1alpha1
kind: BackupPolicy
metadata:
  name: __BACKUP_POLICY_NAME__
  namespace: __BACKUP_NAMESPACE__
spec:
  sourceRef:
    name: __BACKUP_SOURCE_NAME__
  storageRefs:
    - name: __BACKUP_PRIMARY_STORAGE_NAME__
#__FEATURE_BACKUP_SECONDARY_STORAGE_START__
    - name: __BACKUP_SECONDARY_STORAGE_NAME__
#__FEATURE_BACKUP_SECONDARY_STORAGE_END__
  schedule:
    cron: "__BACKUP_SCHEDULE__"
    concurrencyPolicy: Forbid
#__FEATURE_BACKUP_RETENTION_START__
  retentionRef:
    name: __BACKUP_RETENTION_REF__
#__FEATURE_BACKUP_RETENTION_END__
#__FEATURE_BACKUP_NOTIFICATION_START__
  notificationRefs:
    - name: __BACKUP_NOTIFICATION_REF__
#__FEATURE_BACKUP_NOTIFICATION_END__
